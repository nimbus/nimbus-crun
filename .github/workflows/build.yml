name: Build neovex-crun

on:
  pull_request:
    paths:
      - "patches/**"
      - "scripts/**"
      - ".github/container/**"
      - ".github/workflows/build.yml"
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "patches/**"
      - "scripts/**"
      - ".github/container/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CRUN_VERSION: "1.27"
  FEDORA_IMAGE: "fedora:43"

jobs:
  verify:
    name: Verify patch and helpers
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify helper script syntax and help entrypoints
        run: |
          bash -n scripts/verify-patch.sh
          bash -n scripts/build.sh
          bash -n scripts/verify-fedora-userspace.sh
          bash scripts/build.sh --help
          bash scripts/verify-fedora-userspace.sh --help

      - name: Download pinned crun source
        run: |
          curl -fsSL -o crun.tar.gz \
            "https://github.com/containers/crun/archive/refs/tags/${CRUN_VERSION}.tar.gz"
          tar xzf crun.tar.gz

      - name: Verify patch applies cleanly
        run: bash scripts/verify-patch.sh "${{ github.workspace }}/crun-${CRUN_VERSION}"

  build:
    name: Build neovex-crun (linux ${{ matrix.arch }})
    needs: verify
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Initialize build directories
        run: |
          {
            echo "CRUN_SOURCE_DIR=${RUNNER_TEMP}/crun-source"
            echo "BUILD_OUTPUT_DIR=${RUNNER_TEMP}/neovex-crun-output"
            echo "BUILD_WORK_DIR=${RUNNER_TEMP}/neovex-crun-build"
          } >> "${GITHUB_ENV}"
          mkdir -p \
            "${RUNNER_TEMP}/crun-source" \
            "${RUNNER_TEMP}/neovex-crun-output" \
            "${RUNNER_TEMP}/neovex-crun-build"

      - name: Clone pinned crun source with submodules
        run: |
          git clone --depth 1 --branch "${CRUN_VERSION}" --recurse-submodules \
            https://github.com/containers/crun.git "${CRUN_SOURCE_DIR}"

      - name: Build cached builder image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .github/container/Dockerfile.builder
          build-args: |
            FEDORA_IMAGE=${{ env.FEDORA_IMAGE }}
          platforms: ${{ matrix.platform }}
          load: true
          tags: neovex-crun-builder:${{ matrix.arch }}
          cache-from: type=gha,scope=builder-${{ matrix.arch }}
          cache-to: type=gha,scope=builder-${{ matrix.arch }},mode=max

      - name: Build patched crun in builder image
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/work/repo:ro" \
            -v "${CRUN_SOURCE_DIR}:/work/crun-src:ro" \
            -v "${BUILD_OUTPUT_DIR}:/work/output" \
            -v "${BUILD_WORK_DIR}:/work/build" \
            --workdir /work/repo \
            "neovex-crun-builder:${{ matrix.arch }}" \
            bash -lc '
              set -euo pipefail
              git config --global --add safe.directory /work/build
              bash scripts/verify-patch.sh /work/crun-src
              bash scripts/build.sh \
                --source /work/crun-src \
                --output /work/output/crun \
                --build-dir /work/build

              echo "--- version check ---"
              /work/output/crun --version

              version_output="$(/work/output/crun --version)"
              if [[ "${version_output}" != *"+LIBKRUN"* ]]; then
                echo "ERROR: built crun binary does not have +LIBKRUN support" >&2
                exit 1
              fi
              echo "PASS: crun binary has +LIBKRUN support"
            '

      - name: Rename binary for release
        run: |
          mv "${BUILD_OUTPUT_DIR}/crun" "${BUILD_OUTPUT_DIR}/neovex-crun-linux-${{ matrix.arch }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: neovex-crun-linux-${{ matrix.arch }}
          if-no-files-found: error
          path: ${{ env.BUILD_OUTPUT_DIR }}/neovex-crun-linux-${{ matrix.arch }}

  publish:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/artifacts

      - name: Prepare release assets
        id: release-assets
        run: |
          release_dir="${RUNNER_TEMP}/release"
          mkdir -p "${release_dir}"

          cp "${RUNNER_TEMP}/artifacts/neovex-crun-linux-amd64/neovex-crun-linux-amd64" "${release_dir}/"
          cp "${RUNNER_TEMP}/artifacts/neovex-crun-linux-arm64/neovex-crun-linux-arm64" "${release_dir}/"

          cd "${release_dir}"
          sha256sum neovex-crun-linux-amd64 neovex-crun-linux-arm64 > checksums.txt
          cat checksums.txt

          echo "release_dir=${release_dir}" >> "${GITHUB_OUTPUT}"

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: |
            ${{ steps.release-assets.outputs.release_dir }}/neovex-crun-linux-amd64
            ${{ steps.release-assets.outputs.release_dir }}/neovex-crun-linux-arm64
            ${{ steps.release-assets.outputs.release_dir }}/checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_dir="${{ steps.release-assets.outputs.release_dir }}"

          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "neovex-crun ${{ github.ref_name }}" \
            --notes "$(cat <<'NOTES'
          Patched crun binary with libkrun TSI port mapping support.

          **Build:** crun 1.27 + `0001-krun-add-tsi-port-mapping-via-oci-annotation.patch`

          The binary includes `+LIBKRUN` support and reads the `krun.port_map` OCI
          annotation to configure TSI port forwarding via `krun_set_port_map()`.

          **Verify:**
          ```bash
          sha256sum -c checksums.txt
          ./neovex-crun-linux-amd64 --version  # should show +LIBKRUN
          ```
          NOTES
          )" \
            "${release_dir}/neovex-crun-linux-amd64" \
            "${release_dir}/neovex-crun-linux-arm64" \
            "${release_dir}/checksums.txt"
